<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KanbanOS 95 — Вход в систему</title>
  <link rel="stylesheet" href="/static/login%20register/style.css">
</head>
<body>
  <div class="desktop">
    <div class="login-window">
      <div class="title-bar">
        <div class="title-bar-left">
          <span>🔐</span>
          <span>KanbanOS 95 — Вход в систему</span>
        </div>
      </div>

      <div class="client-area">
        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="tab-btn active" onclick="switchTab('login')">Вход</button>
          <button class="tab-btn" onclick="switchTab('register')">Регистрация</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="auth-pane active">
          <div class="form-group">
            <label>👤 Логин или Email</label>
            <input type="text" id="loginUsername" placeholder="username@example.com">
          </div>
          <div class="form-group">
            <label>🔒 Пароль</label>
            <input type="password" id="loginPassword" placeholder="••••••••">
          </div>
          <button class="btn-primary" onclick="login()">Войти в систему</button>
          <div class="demo-hint">
            <small>Демо-аккаунт: <strong>admin / admin123</strong></small>
          </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="auth-pane">
          <div class="form-group">
            <label>👤 Имя пользователя</label>
            <input type="text" id="regUsername" placeholder="ivan">
          </div>
          <div class="form-group">
            <label>📧 Email</label>
            <input type="email" id="regEmail" placeholder="ivan@example.com">
          </div>
          <div class="form-group">
            <label>🔒 Пароль</label>
            <input type="password" id="regPassword" placeholder="••••••••">
          </div>
          <div class="form-group">
            <label>🔒 Подтверждение пароля</label>
            <input type="password" id="regConfirmPassword" placeholder="••••••••">
          </div>
          <button class="btn-primary" onclick="register()">Зарегистрироваться</button>
        </div>
      </div>

      <div class="status-bar">
        <div id="statusMsg" class="status-cell">⚡ Введите учётные данные</div>
      </div>
    </div>
  </div>

  <div id="notifContainer"></div>

  <script src="/static/login%20register/script.js"></script>
</body>
</html>
