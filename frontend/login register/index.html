<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KanbanOS 95 — Вход</title>
  <link rel="stylesheet" href="/static/login%20register/style.css">
</head>
<body>
  <div class="desktop">
    <div class="login-window">
      <div class="title-bar">
        <div class="title-bar-left">
          <span>🔐 KanbanOS 95 — Вход в систему</span>
        </div>
      </div>

      <div class="client-area">
        <!-- Login Form (активен по умолчанию) -->
        <div id="loginForm" class="auth-pane active">
          <div class="form-group">
            <label>👤 Логин</label>
            <input type="text" id="loginUsername" placeholder="username" autocomplete="username">
          </div>
          <div class="form-group">
            <label>🔒 Пароль</label>
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
          </div>
          <button class="btn-primary" onclick="login()">Войти в систему</button>
          
          <div class="register-btn-container">
            <button class="btn-register" onclick="showRegister()">📝 Зарегистрироваться</button>
          </div>
        </div>

        <!-- Register Form (скрыт по умолчанию) -->
        <div id="registerForm" class="auth-pane">
          <div class="form-group">
            <label>👤 Логин</label>
            <input type="text" id="regUsername" placeholder="username" autocomplete="username">
          </div>
          <div class="form-group">
            <label>🔒 Пароль</label>
            <input type="password" id="regPassword" placeholder="••••••••" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label>🔒 Подтверждение пароля</label>
            <input type="password" id="regConfirmPassword" placeholder="••••••••" autocomplete="new-password">
          </div>
          <button class="btn-primary" onclick="register()">Зарегистрироваться</button>
          
          <div class="login-btn-container">
            <button class="btn-back" onclick="showLogin()">← Назад к входу</button>
          </div>
        </div>
      </div>

      <div class="status-bar">
        <div id="statusMsg" class="status-cell">⚡ Введите учётные данные</div>
      </div>
    </div>
  </div>

  <div id="notifContainer"></div>

  <script src="/static/login%20register/script.js"></script>
</body>
</html>
