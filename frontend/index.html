<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board for Windows 95</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="desktop">
        <div class="window maximized">
            <!-- Заголовок окна -->
            <div class="title-bar">
                <div class="title-bar-text">
                    <span>📋</span>
                    <span>Kanban Board v1.0</span>
                </div>
                <div class="title-bar-buttons">
                    <button>─</button>
                    <button>□</button>
                    <button>✕</button>
                </div>
            </div>
            
            <!-- Меню -->
            <div class="menu-bar">
                <span><u>Ф</u>айл</span>
                <span><u>П</u>равка</span>
                <span><u>В</u>ид</span>
                <span><u>З</u>адачи</span>
                <span><u>С</u>правка</span>
            </div>
            
            <!-- Панель инструментов -->
            <div class="toolbar">
                <button onclick="openModal()">📝 Новая</button>
                <button>✂️ Вырезать</button>
                <button>📋 Копировать</button>
                <button>📌 Вставить</button>
                <button>🗑️ Удалить</button>
                <button>🔄 Обновить</button>
            </div>
            
            <!-- Рабочая область -->
            <div class="client-area">
                <div class="board" id="board">
                    <div class="column">
                        <div class="column-header">
                            📋 To Do
                            <span class="count" id="todo-count">0</span>
                        </div>
                        <div class="column-body" id="todo" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                    </div>
                    <div class="column">
                        <div class="column-header">
                            🔄 In Progress
                            <span class="count" id="progress-count">0</span>
                        </div>
                        <div class="column-body" id="in-progress" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                    </div>
                    <div class="column">
                        <div class="column-header">
                            ✅ Done
                            <span class="count" id="done-count">0</span>
                        </div>
                        <div class="column-body" id="done" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                    </div>
                </div>
            </div>
            
            <!-- Строка состояния -->
            <div class="status-bar">
                <span>📋 Задач: <b id="total-tasks">0</b></span>
                <span>|</span>
                <span>🟢 Готово</span>
            </div>
        </div>
        
        <!-- Панель задач (как в Win95) -->
        <div class="tray-icon">
            <div class="start-button">
                <b>Пуск</b>
            </div>
            <div class="taskbar-item">
                📋 Kanban Board v1.0
            </div>
        </div>
    </div>
    
    <!-- Модальное окно Win95 -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal-window">
            <div class="title-bar">
                <span>📝 Создание задачи</span>
                <div class="title-bar-buttons">
                    <button onclick="closeModal()">✕</button>
                </div>
            </div>
            <div class="modal-content">
                <div class="field">
                    <label>Название задачи:</label>
                    <input type="text" id="taskTitle" placeholder="">
                </div>
                <div class="field">
                    <label>Описание:</label>
                    <textarea id="taskDesc" placeholder=""></textarea>
                </div>
                <div class="field">
                    <label>Приоритет:</label>
                    <select id="taskPriority">
                        <option value="LOW">Низкий</option>
                        <option value="MEDIUM" selected>Средний</option>
                        <option value="HIGH">Высокий</option>
                        <option value="CRITICAL">Критичный</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button class="btn-ok" onclick="createTask()">OK</button>
                    <button class="btn-cancel" onclick="closeModal()">Отмена</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
